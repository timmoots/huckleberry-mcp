app = "huckleberry-mcp"
primary_region = "iad"

[build]

[env]
  MCP_TRANSPORT = "streamable-http"
  PORT = "8080"
  HUCKLEBERRY_TIMEZONE = "America/New_York"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
