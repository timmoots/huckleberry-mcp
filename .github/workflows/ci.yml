name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install deps
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check src

      - name: Ruff format check
        run: uv run ruff format --check src

      - name: Import smoke
        env:
          MCP_TRANSPORT: stdio
        run: |
          uv run python -c "
          import sys; sys.path.insert(0, 'src')
          from huckleberry_mcp.server import _build_mcp
          import asyncio
          mcp = _build_mcp()
          tools = asyncio.run(mcp.get_tools())
          assert 'log_diaper' in tools
          assert 'log_pumping' in tools
          assert len(tools) >= 25, f'got {len(tools)} tools'
          print(f'OK — {len(tools)} tools registered')
          "

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t huckleberry-mcp:ci .
